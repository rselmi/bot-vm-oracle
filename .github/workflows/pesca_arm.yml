name: OCI ARM Fisher
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  launch-instance:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: |
          pip install oci-cli
          # Esta linha abaixo é a "mágica" que resolve o comando não encontrado
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          mkdir -p ~/.oci

      - name: Configure OCI CLI
        run: |
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
          echo "key_file=/home/runner/.oci/key.pem" >> ~/.oci/config
          
          echo "${{ secrets.OCI_PRIVATE_KEY }}" | base64 -d > /home/runner/.oci/key.pem
          chmod 600 /home/runner/.oci/key.pem

      - name: Try to Launch ARM Instance (High Frequency)
        run: |
          export OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING=True
          for i in 1 2 3; do
            echo "--- Tentativa $i de 3 ---"
            
            # Agora podemos usar apenas 'oci' novamente
            oci compute instance launch \
              --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
              --availability-domain "IQFJ:SA-VINHEDO-1-AD-1" \
              --shape "VM.Standard.A1.Flex" \
              --image-id "${{ secrets.OCI_IMAGE_ID }}" \
              --subnet-id "${{ secrets.OCI_SUBNET_ID }}" \
              --shape-config '{"ocpus": 4, "memoryInGBs": 24}' \
              --assign-public-ip true \
              --display-name "Ollama-Server-Prod" \
              --ssh-authorized-keys-file <(echo "${{ secrets.SSH_PUBLIC_KEY }}") && { echo "!!! SUCESSO !!! VM CRIADA."; exit 0; }
            
            echo "Sem capacidade em Vinhedo. Esperando 20s..."
            sleep 20
          done
